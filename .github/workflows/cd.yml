name: CD

on:
  push:
    branches: [main]

concurrency:
  group: norozo-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY_IMAGE: ghcr.io/team-deepiri/deepiri-norozo

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt ruff
      - run: ruff check .
      - run: pytest

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: generate image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short
      - name: build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to Render
        id: render
        env:
          DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "${DEPLOY_HOOK:-}" ]; then
            echo "::warning::RENDER_DEPLOY_HOOK_URL not set — skipping deploy hook (Render may still auto-deploy from GitHub)."
            exit 0
          fi
          HOOK="$(python -c "import os; print(os.environ['DEPLOY_HOOK'].strip())")"
          echo "Triggering Render deploy for commit ${GITHUB_SHA::7} (Git-backed service — Render builds from repo)."
          curl -fsS -X POST "$HOOK"

      - name: Notify Discord — success
        if: success() && steps.render.outcome == 'success'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then
            exit 0
          fi
          curl -sf -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg repo "${{ github.repository }}" \
              --arg sha "${{ github.sha }}" \
              --arg url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              '{content: ("✅ Norozo deployed **" + $repo + "** `" + $sha[0:7] + "` → Render\n" + $url)}')"

      - name: Notify Discord — failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then
            exit 0
          fi
          curl -sf -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg repo "${{ github.repository }}" \
              --arg sha "${{ github.sha }}" \
              --arg url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              '{content: ("❌ Norozo deploy failed **" + $repo + "** `" + $sha[0:7] + "`\n" + $url)}')"

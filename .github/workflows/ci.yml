name: CI

on:           
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:         
  test:
    runs-on: ubuntu-latest      
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:                      
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -r requirements.txt ruff
      - run: ruff check . 
      - run: pytest 
